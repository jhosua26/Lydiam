                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Trading Name (if different)</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="tradingName"
                                            value={companyInfo.tradingName}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Legal Entity Type
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="legalEntityType"
                                            value={companyInfo.legalEntityType}
                                            options={legalEntityTypeOptions}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Date of Incorporation
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="date"
                                            name="dateOfIncorporation"
                                            value={companyInfo.dateOfIncorporation}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Country of Incorporation
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="countryOfIncorporation"
                                            value={companyInfo.countryOfIncorporation}
                                            options={countryPicklistOptions}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Registration Number / Company Number
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-input
                                    type="text"
                                    name="registrationNumber"
                                    value={companyInfo.registrationNumber}
                                    onchange={handleCompanyInfoChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <!-- Registered Business Address -->
                        <div class="slds-text-heading_small slds-m-top_medium slds-m-bottom_small">
                            <abbr class="slds-required" title="required">*</abbr> Registered Business Address
                        </div>
                        <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-1">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Street Address
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="registeredStreet"
                                            value={companyInfo.registeredStreet}
                                            placeholder="Street address"
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> City
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="registeredCity"
                                            value={companyInfo.registeredCity}
                                            placeholder="City"
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">State / Province</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="registeredState"
                                            value={companyInfo.registeredState}
                                            placeholder="State or Province"
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Postal Code</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="registeredPostalCode"
                                            value={companyInfo.registeredPostalCode}
                                            placeholder="Postal Code"
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-1">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Country
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="registeredCountry"
                                            value={companyInfo.registeredCountry}
                                            placeholder="Country"
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Are you a regulated company?
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-radio-group
                                    name="isRegulatedFinancialInstitution"
                                    options={yesNoOptions}
                                    value={companyInfo.isRegulatedFinancialInstitution}
                                    type="radio"
                                    onchange={handleCompanyInfoChange}>
                                </lightning-radio-group>
                            </div>
                            <div class="slds-form-element__help slds-text-color_weak">
                                If your company is regulated by a financial authority, please select Yes and provide the details below.
                            </div>
                        </div>

                        <template if:true={showRegulatoryDetails}>
                            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                <div class="slds-col slds-size_1-of-3">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Name of Regulator
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-input
                                                type="text"
                                                name="regulatorName"
                                                value={companyInfo.regulatorName}
                                                onchange={handleCompanyInfoChange}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-3">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Regulatory Licence Number
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-input
                                                type="text"
                                                name="regulatoryLicenceNumber"
                                                value={companyInfo.regulatoryLicenceNumber}
                                                onchange={handleCompanyInfoChange}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-3">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Jurisdiction of Regulatory Supervision
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-combobox
                                                name="regulatoryJurisdiction"
                                                value={companyInfo.regulatoryJurisdiction}
                                                options={countryPicklistOptions}
                                                onchange={handleCompanyInfoChange}>
                                            </lightning-combobox>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">Website (URL)</label>
                            <div class="slds-form-element__control">
                                <lightning-input
                                    type="url"
                                    name="website"
                                    value={companyInfo.website}
                                    onchange={handleCompanyInfoChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Corporate Email
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="email"
                                            name="email"
                                            value={companyInfo.email}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Corporate Phone</label>
                                    <div class="slds-form-element__help">
                                        Format: {corporatePhoneFormatHint}
                                    </div>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="tel"
                                            name="phone"
                                            value={companyInfo.phone}
                                            placeholder={corporatePhonePlaceholder}
                                            pattern={corporatePhonePattern}
                                            message-when-pattern-mismatch={corporatePhonePatternError}
                                            onchange={handleCompanyInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Nature of Business field removed - captured in Business Context step as "Products and Services" -->
                        <!-- Restricted Activities field removed - compliance info captured elsewhere -->

                        <div class="slds-form-element slds-m-bottom_large">
                            <label class="slds-form-element__label">Expected Number of Employees</label>
                            <div class="slds-form-element__control">
                                <lightning-input
                                    type="number"
                                    name="expectedNumberOfEmployees"
                                    value={companyInfo.expectedNumberOfEmployees}
                                    onchange={handleCompanyInfoChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-m-top_large">
                            <lightning-button 
                                label="Back" 
                                class="slds-m-right_small" 
                                onclick={handleBack}>
                            </lightning-button>
                            <lightning-button 
                                label="Continue" 
                                variant="brand" 
                                onclick={handleContinue}
                                disabled={isCompanyInfoStepDisabled}>
                            </lightning-button>
                        </div>
                    </template>

                    <!-- Section 2C: Business & Transaction Context -->
                    <template if:true={showBusinessContextStep}>
                        <div class="slds-text-heading_medium slds-m-bottom_medium">Business & Transaction Context</div>
                        
                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Purpose of the Account
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-textarea
                                    name="purposeOfAccount"
                                    value={businessContext.purposeOfAccount}
                                    placeholder="Explain why the account is being opened (e.g. hedging FX, managing cross-border payments, investing in digital assets, seeking advisory)"
                                    onchange={handleBusinessContextChange}>
                                </lightning-textarea>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Industry
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-combobox
                                    name="industry"
                                    value={businessContext.industry}
                                    placeholder="Select an industry..."
                                    options={industryOptions}
                                    onchange={handleBusinessContextChange}>
                                </lightning-combobox>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Describe the Company's Products and Services
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-textarea
                                    name="productsAndServices"
                                    value={businessContext.productsAndServices}
                                    placeholder="e.g., We are a software company that provides cloud-based solutions to retail businesses..."
                                    onchange={handleBusinessContextChange}>
                                </lightning-textarea>
                            </div>
                            <div class="slds-form-element__help slds-text-color_weak">
                                Briefly describe what your company does, the products or services you offer, and who your typical customers are.
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Payment Flow Types
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-checkbox-group
                                    name="paymentFlowTypes"
                                    options={paymentFlowTypeOptions}
                                    value={businessContext.paymentFlowTypes}
                                    onchange={handleBusinessContextChange}>
                                </lightning-checkbox-group>
                            </div>
                            <div class="slds-form-element__help slds-text-color_weak">
                                Select how funds typically flow through your account. 1st Party = Your company. 3rd Party = External parties (customers, suppliers, etc.)
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Expected Transactions per Month
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="number"
                                            name="expectedTransactionsPerMonth"
                                            value={businessContext.expectedTransactionsPerMonth}
                                            onchange={handleBusinessContextChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Expected Annual Transaction Volume
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="number"
                                            name="expectedAnnualVolume"
                                            value={businessContext.expectedAnnualVolume}
                                            formatter="currency"
                                            step="0.01"
                                            onchange={handleBusinessContextChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Typical Value per Transaction
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="number"
                                            name="typicalValuePerTransaction"
                                            value={businessContext.typicalValuePerTransaction}
                                            formatter="currency"
                                            step="0.01"
                                            onchange={handleBusinessContextChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Currencies: Only show if FX service selected -->
                        <template if:true={hasFXService}>
                            <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                <div class="slds-col slds-size_1-of-2">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Currencies You Will Send
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-dual-listbox
                                                name="currenciesToSend"
                                                source-label="Available"
                                                selected-label="Selected"
                                                options={currencyOptions}
                                                value={businessContext.currenciesToSend}
                                                onchange={handleBusinessContextChange}>
                                            </lightning-dual-listbox>
                                        </div>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Currencies You Will Receive
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-dual-listbox
                                                name="currenciesToReceive"
                                                source-label="Available"
                                                selected-label="Selected"
                                                options={currencyOptions}
                                                value={businessContext.currenciesToReceive}
                                                onchange={handleBusinessContextChange}>
                                            </lightning-dual-listbox>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Countries Funds Will Be Sent To
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-dual-listbox
                                            name="countriesFundsSentTo"
                                            source-label="Available"
                                            selected-label="Selected"
                                            options={countryPicklistOptions}
                                            value={businessContext.countriesFundsSentTo}
                                            onchange={handleBusinessContextChange}>
                                        </lightning-dual-listbox>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Countries Funds Will Be Received From
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-dual-listbox
                                            name="countriesFundsReceivedFrom"
                                            source-label="Available"
                                            selected-label="Selected"
                                            options={countryPicklistOptions}
                                            value={businessContext.countriesFundsReceivedFrom}
                                            onchange={handleBusinessContextChange}>
                                        </lightning-dual-listbox>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">Largest Single Transaction Expected</label>
                            <div class="slds-form-element__control">
                                <lightning-input
                                    type="number"
                                    name="largestSingleTransaction"
                                    value={businessContext.largestSingleTransaction}
                                    formatter="currency"
                                    step="0.01"
                                    onchange={handleBusinessContextChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Primary Source of Funds
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-combobox
                                    name="primarySourceOfFunds"
                                    value={businessContext.primarySourceOfFunds}
                                    options={sourceOfFundsOptions}
                                    onchange={handleBusinessContextChange}>
                                </lightning-combobox>
                            </div>
                        </div>
                        <!-- Source of Wealth for Business Owners field removed - captured in Explanation field -->

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Source of Wealth - Explanation
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-textarea
                                    name="sourceOfWealthExplanation"
                                    value={businessContext.sourceOfWealthExplanation}
                                    onchange={handleBusinessContextChange}>
                                </lightning-textarea>
                            </div>
                        </div>

                        <!-- Service-Specific Requirements (Merged from Service Step) -->
                        <div class="slds-m-top_x-large slds-m-bottom_medium">
                            <div class="slds-text-heading_medium slds-m-bottom_small">Service-Specific Requirements</div>
                            <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium">
                                Please provide additional details based on the services you selected.
                            </p>
                        </div>

                        <!-- FX Service Questions -->
                        <template if:true={hasFXService}>
                            <div class="slds-box slds-m-bottom_medium">
                                <div class="slds-text-heading_small slds-m-bottom_small">Foreign Exchange (FX)</div>
                                
                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Forward Contracts/Hedging Required?
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-radio-group
                                            name="fxForwardContractsRequired"
                                            options={yesNoOptions}
                                            value={serviceSpecific.fxForwardContractsRequired}
                                            type="radio"
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-radio-group>
                                    </div>
                                </div>

                                <template if:true={showHedgingDetails}>
                                    <div class="slds-form-element slds-m-bottom_medium">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Describe Hedging Needs
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-textarea
                                                name="fxHedgingNeeds"
                                                value={serviceSpecific.fxHedgingNeeds}
                                                onchange={handleServiceSpecificChange}>
                                            </lightning-textarea>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Crypto Service Questions -->
                        <template if:true={hasCryptoService}>
                            <div class="slds-box slds-m-bottom_medium">
                                <div class="slds-text-heading_small slds-m-bottom_small">Crypto / Digital Assets</div>
                                
                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Digital Assets to Buy/Sell/Hold
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="digitalAssets"
                                            options={digitalAssetOptions}
                                            value={serviceSpecific.digitalAssets}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Expected Monthly Digital Asset Transaction Volume
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="expectedMonthlyCryptoVolume"
                                                    value={serviceSpecific.expectedMonthlyCryptoVolume}
                                                    formatter="currency"
                                                    step="0.01"
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Average Digital Asset Transaction Size
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="averageCryptoTransactionSize"
                                                    value={serviceSpecific.averageCryptoTransactionSize}
                                                    formatter="currency"
                                                    step="0.01"
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- VASP question removed - regulatory status captured in Company Info step -->
                            </div>
                        </template>

                        <!-- Advisory Service Questions -->
                        <template if:true={hasAdvisoryService}>
                            <div class="slds-box slds-m-bottom_medium">
                                <div class="slds-text-heading_small slds-m-bottom_small">Advisory Services</div>
                                
                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Advisory Services Required
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="advisoryServicesRequired"
                                            options={advisoryServicesOptions}
                                            value={serviceSpecific.advisoryServicesRequired}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Investment Objectives
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="investmentObjectives"
                                            options={investmentObjectivesOptions}
                                            value={serviceSpecific.investmentObjectives}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Risk Appetite
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-radio-group
                                            name="riskAppetite"
                                            options={riskAppetiteOptions}
                                            value={serviceSpecific.riskAppetite}
                                            type="radio"
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-radio-group>
                                    </div>
                                </div>

                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">Time Horizon for Investment Decisions (Years)</label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="timeHorizon"
                                                    value={serviceSpecific.timeHorizon}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Existing Advisory Relationships</label>
                                    <div class="slds-form-element__control">
                                        <lightning-textarea
                                            name="existingAdvisoryRelationships"
                                            value={serviceSpecific.existingAdvisoryRelationships}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-textarea>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <div class="slds-m-top_large">
                            <lightning-button 
                                label="Back" 
                                class="slds-m-right_small" 
                                onclick={handleBack}>
                            </lightning-button>
                            <lightning-button 
                                label="Continue" 
                                variant="brand" 
                                onclick={handleContinue}
                                disabled={isBusinessContextStepDisabled}>
                            </lightning-button>
                        </div>
                    </template>

                    <!-- Service step merged into Business Context step above -->
                    <!-- Regulatory & Compliance Risk and Document Uploads steps removed per requirements -->
                </template>

                <!-- STEP 3: Declarations & Submission (All Clients) -->
                <template if:true={showDeclarationsStep}>
                    <div class="slds-text-heading_medium slds-m-bottom_medium">Declarations & Submission</div>
                    
                    <!-- Initial Declarations -->
                    <div class="slds-m-bottom_large">
                        <p class="slds-text-body_regular slds-m-bottom_small">
                            By signing and returning this form, I/we confirm for and on behalf of the applicant that:
                        </p>
                        <ul class="slds-list_dotted slds-m-left_medium">
                            <li class="slds-text-body_regular">I have read, understood and accurately completed the application form to open a trading account.</li>
                            <li class="slds-text-body_regular">I have read, understood and accurately completed the Lydiam Group Ltd Professional Electronic Trading Agreement and all other agreements herein.</li>
                            <li class="slds-text-body_regular">I have read, understood and accurately completed the nature and risks of the products intended to trade through this account.</li>
                        </ul>
                    </div>

                    <!-- Applicant Authorization -->
                    <div class="slds-m-bottom_large">
                        <p class="slds-text-body_regular">
                            As the applicant, I have authorization to act on all matters regarding opening and operating the trading account with Lydiam Group including but not limited to deposits, withdrawals, trading and investment instruments.
                        </p>
                    </div>

                    <!-- Terms of Business -->
                    <div class="slds-m-bottom_large">
                        <div class="slds-text-heading_small slds-m-bottom_small">TERMS OF BUSINESS</div>
                        <p class="slds-text-body_regular">
                            Please follow this link to view our Terms of Business: 
                            <a href="https://ability-customization-4283--partial.sandbox.my.salesforce.com/sfc/p/#Ae00000AaBf7/a/Ae000000L65d/TCtUzikYJJWLzmxC03A3txNZ7rZEgqpH.nnd.oBX3c4" 
                               target="_blank" 
                               class="slds-text-link">
                                Click here
                            </a>
                        </p>
                    </div>

                    <!-- Electronic Signature and Adoption -->
                    <div class="slds-m-bottom_large">
                        <div class="slds-text-heading_small slds-m-bottom_small">ELECTRONIC SIGNATURE AND ADOPTION</div>
                        <p class="slds-text-body_regular">
                            By using a keypad, mouse, or other device to select an item, button, icon or similar act/action, you are signing this Agreement electronically. You agree that your electronic signature is the legal equivalent of your manual signature on this Agreement. By selecting "I Agree" using any device, means or action, you consent to be legally bound by this Agreement's terms and conditions. You further agree that your identity cannot be reasonably questioned based on the foregoing and that the foregoing satisfies any requirement for a "signature" under any applicable law including, without limitation, the Electronic Signatures in Global and National Commerce Act, Uniform Electronic Transactions Act, and any other law based on the Uniform Electronic Transactions Act or similar act. You further agree that no certification authority or other third-party verification is necessary to validate your E-Signature and that the lack of such certification or third-party verification will not in any way affect the enforceability of your E-Signature or this Agreement. You also agree that each use of your E-Signature in executing this Agreement constitutes your adoption of such signature as your own, with the intent to acknowledge or sign, and that such signature is logically associated with the document or record to which it relates.
                        </p>
                    </div>

                    <!-- Supporting Documentation Uploading (Corporate Only) -->
                    <template if:true={isCorporateClient}>
                        <div class="slds-m-bottom_large">
                            <div class="slds-text-heading_small slds-m-bottom_small">Supporting Documentation Uploading</div>
                            <ul class="slds-list_dotted slds-m-left_medium">
                                <li class="slds-text-body_regular">All corporate formation documents</li>
                                <li class="slds-text-body_regular">Corporate formation documents and clear ownership structure for any corporate/entity shareholders</li>
                                <li class="slds-text-body_regular">Most recent bank statement in the name of the company (no screenshots - actual statement required, or only if it's a new account, a welcome letter from the bank showing the account name and number)</li>
                                <li class="slds-text-body_regular">Register of Shareholders and Directors</li>
                                <li class="slds-text-body_regular">Individual verification of Directors (copy of passport and a bank statement or a utility bill less than 90 days old - gas, electric, water, cable, landline phone. We cannot accept credit cards, cellular bills, insurance, or a driver's license.)</li>
                                <li class="slds-text-body_regular">Individual verification of Shareholders/Beneficial Owners with a 25% or greater interest in the Company (copy of passport and a bank statement or a utility bill - gas, electric, water, cable, landline phone. We cannot accept credit cards, cellular bills, insurance, or a driver's license.)</li>
                                <li class="slds-text-body_regular">If the entity handles client funds of any type, an up to date AML/KYC policy.</li>
                                <li class="slds-text-body_regular">Company Structure Chart (A company structure chart is a visualization of the ownership, governance, and management relationships among legal entities of a single enterprise - a collection of companies)</li>
                            </ul>
                        </div>
                    </template>

                    <!-- Signatures Section -->
                    <div class="slds-m-bottom_large">
                        <div class="slds-text-heading_small slds-m-bottom_small">Signatures</div>
                        <p class="slds-text-body_regular">
                            By electronically signing, the applicant represents that all information is true and accurate, agrees to be bound by the agreement, and confirms they are not a third party. Documentation verifying identity and authority may be requested.
                        </p>
                    </div>

                    <!-- Risk Disclosure -->
                    <div class="slds-m-bottom_large">
                        <p class="slds-text-body_regular slds-text-color_error">
                            <strong>Risk Disclosure:</strong> Trading FX, Digital Assets, CFDs, and other Financial Market Products and Instruments carries a high level of risk and may not be suitable for all investors. The high degree of leverage can work against you as well as for you. Before deciding to trade, you should carefully consider your investment objectives, level of experience, and risk appetite. The possibility exists that you could sustain a loss of some or all of your initial investment and therefore you should not invest money that you cannot afford to lose. You should be aware of all the risks associated with trading and seek advice from an independent financial advisor if you have any doubts.
                        </p>
                    </div>

                    <!-- Notes, Corrections, or Missing Information -->
                    <div class="slds-m-bottom_large">
                        <div class="slds-text-heading_small slds-m-bottom_small">Notes, Corrections, or Missing Information</div>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            If you found any errors in the pre-filled information, have additional details to add, or need to clarify anything, please let us know below:
                        </p>
                        <div class="slds-form-element">
                            <div class="slds-form-element__control">
                                <lightning-textarea
                                    name="clientNotes"
                                    placeholder="Example: The registered address is incorrect - should be 123 New Street... OR Shareholder John Smith's ownership is 30%, not 25%... OR Please note we also have operations in Singapore..."
                                    value={declarations.clientNotes}
                                    onchange={handleDeclarationsChange}
                                    max-length="5000">
                                </lightning-textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Required Terms and Conditions -->
                    <div class="slds-m-bottom_large">
                        <div class="slds-text-heading_small slds-m-bottom_small">Terms and Conditions are required*</div>
                        <div class="slds-form-element slds-m-bottom_medium">
                            <div class="slds-form-element__control">
                                <lightning-input
                                    type="checkbox"
                                    name="agreeToTerms"
                                    label="I agree to Terms & Conditions & above declaration"
                                    checked={declarations.agreeToTerms}
                                    onchange={handleDeclarationsChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Signatory First Name
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="signatoryFirstName"
                                            value={declarations.signatoryFirstName}
                                            onchange={handleDeclarationsChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Signatory Last Name
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="signatoryLastName"
                                            value={declarations.signatoryLastName}
                                            onchange={handleDeclarationsChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="slds-m-top_large">
                        <lightning-button 
                            label="Back" 
                            class="slds-m-right_small" 
                            onclick={handleBack}
                            disabled={isSubmitting}>
                        </lightning-button>
                        <lightning-button 
                            label="Submit Application" 
                            variant="brand" 
                            onclick={handleSubmit}
                            disabled={isSubmitButtonDisabled}>
                        </lightning-button>
                    </div>
                    
                    <!-- Error Message with Retry Option -->
                    <template if:true={submissionError}>
                        <div class="slds-box slds-theme_error slds-text-align_center slds-p-around_large slds-m-top_medium">
                            <lightning-icon icon-name="utility:error" size="large" class="slds-m-bottom_medium"></lightning-icon>
                            <div class="slds-text-heading_medium slds-m-bottom_small">Submission Failed</div>
                            <p class="slds-text-body_regular slds-m-bottom_medium">
                                {submissionError.message}
                            </p>
                            <template if:true={showRetryButton}>
                                <lightning-button 
                                    label="Retry Submission" 
                                    variant="brand" 
                                    onclick={handleRetrySubmission}
                                    class="slds-m-right_small">
                                </lightning-button>
                                <lightning-button 
                                    label="Review Form" 
                                    variant="neutral" 
                                    onclick={handleBack}>
                                </lightning-button>
                            </template>
                        </div>
                    </template>
                </template>

                <!-- Success Message - Mobile App Style Animated -->
                <template if:true={showSuccessMessage}>
                    <div class="success-container">
                        <!-- Animated Confetti Particles -->
                        <div class="confetti-container">
                            <div class="confetti confetti-1"></div>
                            <div class="confetti confetti-2"></div>
                            <div class="confetti confetti-3"></div>
                            <div class="confetti confetti-4"></div>
                            <div class="confetti confetti-5"></div>
                            <div class="confetti confetti-6"></div>
                            <div class="confetti confetti-7"></div>
                            <div class="confetti confetti-8"></div>
                            <div class="confetti confetti-9"></div>
                            <div class="confetti confetti-10"></div>
                            <div class="confetti confetti-11"></div>
                            <div class="confetti confetti-12"></div>
                        </div>

                        <!-- Floating Background Elements -->
                        <div class="floating-shapes">
                            <div class="shape shape-1"></div>
                            <div class="shape shape-2"></div>
                            <div class="shape shape-3"></div>
                        </div>

                        <!-- Company Logo with bounce -->
                        <div class="success-logo">
                            <img src={logoUrl} 
                                 alt="Lydiam Logo" 
                                 style="width: 100%; height: auto;" />
                        </div>

                        <!-- Animated Success Checkmark with pulse -->
                        <div class="success-animation-wrapper">
                            <div class="success-checkmark">
                                <div class="checkmark-circle">
                                    <div class="checkmark-glow"></div>
                                    <div class="checkmark-icon">
                                        <div class="checkmark-check"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Success Heading with gradient -->
                        <h1 class="success-heading">
                            <span class="heading-text">Application Submitted</span>
                            <span class="heading-emoji">🎉</span>
                        </h1>

                        <!-- Success Message -->
                        <p class="success-message">
                            Thank you for submitting your onboarding application.<br/>
                            Our team will review your information and contact you shortly.
                        </p>

                        <!-- Animated Info Cards -->
                        <div class="success-cards">
                            <div class="success-card card-1">
                                <div class="card-icon-wrapper">
                                    <lightning-icon icon-name="utility:date_time" 
                                                    size="small" 
                                                    class="card-icon">
                                    </lightning-icon>
                                </div>
                                <div class="card-content">
                                    <div class="card-label">Submitted On</div>
                                    <div class="card-value">{submissionDate}</div>
                                </div>
                            </div>

                            <div class="success-card card-2">
                                <div class="card-icon-wrapper">
                                    <lightning-icon icon-name="utility:clock" 
                                                    size="small" 
                                                    class="card-icon">
                                    </lightning-icon>
                                </div>
                                <div class="card-content">
                                    <div class="card-label">Response Time</div>
                                    <div class="card-value">2-3 Business Days</div>
                                </div>
                            </div>

                            <div class="success-card card-3">
                                <div class="card-icon-wrapper">
                                    <lightning-icon icon-name="utility:email" 
                                                    size="small" 
                                                    class="card-icon">
                                    </lightning-icon>
                                </div>
                                <div class="card-content">
                                    <div class="card-label">We'll Contact You</div>
                                    <div class="card-value">Via Email</div>
                                </div>
                            </div>
                        </div>

                        <!-- Footer with contact -->
                        <div class="success-footer">
                            <div class="footer-icon">
                                <lightning-icon icon-name="utility:chat" 
                                                size="x-small">
                                </lightning-icon>
                            </div>
                            <p class="success-footer-text">
                                Need help? Contact us at 
                                <strong class="contact-email"> info@lydiamgroup.com</strong>
                            </p>
                        </div>
                    </div>
                </template>
            </div>
        </lightning-card>
        
        <!-- PHASE 2: Mobile Sticky Navigation Bar -->
        <template if:true={showMobileNavigation}>
            <div class="mobile-navigation-bar">
                <template if:false={isFirstStep}>
                    <div class="mobile-nav-button">
                        <lightning-button 
                            label="Back" 
                            variant="neutral"
                            icon-name="utility:back"
                            onclick={handleBack}>
                        </lightning-button>
                    </div>
                </template>
                <div class="mobile-nav-button">
                    <lightning-button 
                        label={mobileNavNextLabel} 
                        variant="brand"
                        icon-name={mobileNavNextIcon}
                        icon-position="right"
                        onclick={handleMobileNavNext}
                        disabled={isSubmitting}>
                    </lightning-button>
                </div>
            </div>
        </template>
    </div>
</template>
