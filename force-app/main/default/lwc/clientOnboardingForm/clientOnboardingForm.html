<template>
    <!-- Loading Overlay -->
    <template if:true={isSubmitting}>
        <div class="loading-overlay">
            <div class="loading-overlay-content">
                <lightning-spinner alternative-text="Submitting application" size="large"></lightning-spinner>
                <div class="slds-text-heading_small slds-m-top_medium">Submitting your application...</div>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                    Please do not close this page or navigate away.
                </p>
            </div>
        </div>
    </template>
    
    <div class="slds-container_center slds-container_large onboarding-container">
        <!-- Company Logo Header (visible everywhere except success page) -->
        <template if:false={showSuccessMessage}>
            <div class="company-logo-header">
                <img src={logoUrl} 
                     alt="Lydiam Logo" 
                     class="company-logo" />
            </div>
        </template>
        
        <!-- Progress Indicator -->
        <div class="progress-indicator-container" if:true={showProgress}>
            <div class="fancy-progress-wrapper">
                <!-- Progress Percentage -->
                <div class="progress-header">
                    <div class="progress-percentage">
                        <span class="progress-percentage-value">{progressPercentage}%</span>
                        <span class="progress-percentage-label">Complete</span>
                    </div>
                    <div class="progress-step-counter">
                        Step {currentStepNumber} of {totalSteps}
                    </div>
                </div>
                
                <!-- Progress Bar -->
                <div class="fancy-progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
                
                <!-- Step Indicators (Desktop) -->
                <div class="fancy-progress-steps">
                    <template for:each={progressSteps} for:item="step">
                        <div key={step.key} class="fancy-step-wrapper">
                            <div class={step.stepClass}>
                                <div class="step-circle">
                                    <template if:true={step.isCompleted}>
                                        <lightning-icon 
                                            icon-name="utility:check" 
                                            size="x-small" 
                                            class="step-check-icon">
                                        </lightning-icon>
                                    </template>
                                    <template if:false={step.isCompleted}>
                                        <span class="step-number">{step.stepNumber}</span>
                                    </template>
                                </div>
                                <div class="step-ripple" if:true={step.isActive}></div>
                            </div>
                            <div class="step-label-container">
                                <span class={step.labelClass}>{step.label}</span>
                            </div>
                            <div class="step-connector" if:true={step.showConnector}>
                                <div class={step.connectorClass}></div>
                            </div>
                        </div>
                    </template>
                </div>
                
                <!-- PHASE 2: Simplified Mobile Progress Dots -->
                <div class="mobile-simple-progress">
                    <template for:each={progressSteps} for:item="step">
                        <div key={step.key} 
                             class={step.mobileDotClass}>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        
        <!-- PHASE 2: Auto-Save Indicator -->
        <template if:true={showAutoSaveIndicator}>
            <div class={autoSaveIndicatorClass}>
                <div class="auto-save-icon">
                    <lightning-icon 
                        icon-name={autoSaveIconName} 
                        size="x-small">
                    </lightning-icon>
                </div>
                <div class="auto-save-text">{autoSaveMessage}</div>
            </div>
        </template>

        <!-- ============================================
             BANNER SYSTEM - HYBRID APPROACH
             ============================================ -->
        
        <!-- BANNER 1: Agent Banner (Orange) - For Internal Agents -->
        <template if:true={showAgentBanner}>
            <div class="slds-box slds-box_small slds-theme_warning slds-m-bottom_medium agent-banner">
                <div class="slds-media">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <div class="slds-grid slds-grid_vertical-align-center slds-grid_vertical-stretch">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">
                                    ⚠️ You're continuing a saved application
                                </h3>
                                <p class="slds-text-body_small">
                                    Your progress from a previous session has been restored. You can continue where you left off.
                                </p>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                                <div class="slds-grid slds-wrap slds-grid_vertical-align-center slds-gutters_small">
                                    <!-- Start New Application Button -->
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-button 
                                            variant="neutral" 
                                            label="Start New Application" 
                                            title="Discard saved progress and start fresh"
                                            icon-name="utility:add"
                                            onclick={handleStartNewApplication}
                                            class="slds-button_stretch">
                                        </lightning-button>
                                    </div>
                                    <!-- Copy Client Link Button -->
                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                        <lightning-button 
                                            label="Copy Client Link" 
                                            icon-name="utility:share"
                                            variant="neutral"
                                            onclick={handleCopyClientLink}
                                            class="slds-button_stretch">
                                        </lightning-button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- BANNER 2: Client Banner (Blue) - For External Clients Returning -->
        <template if:true={showClientBanner}>
            <div class="slds-box slds-box_small slds-m-bottom_medium client-banner">
                <div class="slds-media">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:success" size="small" variant="inverse"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">
                            👋 Welcome back!
                        </h3>
                        <p class="slds-text-body_small">
                            Your progress has been saved. Continue where you left off, or update any information as needed.
                        </p>
                    </div>
                </div>
            </div>
        </template>

        <!-- BANNER 3: No Banner (Invisible) - For Clients Reviewing Pre-filled Work -->
        <!-- When showNoBanner is true, nothing is shown -->

        <!-- Main Form Card -->
        <lightning-card title={formTitle} icon-name="utility:user">
            <div class="slds-p-around_large">   
                
                <!-- STEP 0: Entry Point -->
                <template if:true={showEntryStep}>
                    <div class="slds-text-heading_medium slds-m-bottom_medium">Get Started</div>
                    <p class="slds-text-body_regular slds-m-bottom_large">
                        Please provide the following information to begin your onboarding process.
                    </p>

                    <!-- Q0.1: Services Required -->
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label">
                            <abbr class="slds-required" title="required">*</abbr> Services Required
                        </label>
                        <div class="slds-form-element__control">
                            <lightning-checkbox-group 
                                name="services"
                                options={serviceOptions}
                                value={servicesRequired}
                                onchange={handleServicesChange}>
                            </lightning-checkbox-group>
                        </div>
                    </div>

                    <!-- Q0.2: Client Type -->
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label">
                            <abbr class="slds-required" title="required">*</abbr> Client Type
                        </label>
                        <div class="slds-form-element__control">
                            <lightning-radio-group 
                                name="clientType"
                                options={clientTypeOptions}
                                value={clientType}
                                type="radio"
                                onchange={handleClientTypeChange}>
                            </lightning-radio-group>
                        </div>
                    </div>

                    <!-- Q0.3: Channel -->
                    <div class="slds-form-element slds-m-bottom_large">
                        <label class="slds-form-element__label">
                            Channel
                        </label>
                        <div class="slds-form-element__control">
                            <lightning-combobox
                                name="channel"
                                options={channelOptions}
                                value={channel}
                                placeholder="Select channel"
                                onchange={handleChannelChange}>
                            </lightning-combobox>
                        </div>
                    </div>

                    <div class="slds-m-top_large">
                        <lightning-button 
                            label="Continue" 
                            variant="brand" 
                            onclick={handleContinue}
                            disabled={isEntryStepDisabled}>
                        </lightning-button>
                    </div>
                </template>

                <!-- PRIVATE CLIENT BRANCH -->
                <template if:true={showPrivateBranch}>
                    
                    <!-- Section 1A: Personal Information & Identity -->
                    <template if:true={showPersonalInfoStep}>
                        <div class="slds-text-heading_medium slds-m-bottom_medium">Personal Information & Identity</div>
                        
                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-5">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Salutation
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="salutation"
                                            value={personalInfo.salutation}
                                            options={salutationOptions}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-5">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> First Name
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="firstName"
                                            value={personalInfo.firstName}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-5">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Middle Name</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="middleName"
                                            value={personalInfo.middleName}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-5">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Last Name
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="lastName"
                                            value={personalInfo.lastName}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-5">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Suffix</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="suffix"
                                            value={personalInfo.suffix}
                                            placeholder="Jr., Sr., III, etc."
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Date of Birth
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="date"
                                            name="dateOfBirth"
                                            value={personalInfo.dateOfBirth}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Nationality (Country)
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="nationality"
                                            value={personalInfo.nationality}
                                            options={countryPicklistOptions}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Country of Residence
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="countryOfResidence"
                                            value={personalInfo.countryOfResidence}
                                            options={countryPicklistOptions}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Government Identification Number
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="governmentIdNumber"
                                            value={personalInfo.governmentIdNumber}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Email
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="email"
                                            name="email"
                                            value={personalInfo.email}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Mobile</label>
                                    <div class="slds-form-element__help">
                                        Format: {phoneFormatHint}
                                    </div>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="tel"
                                            name="mobile"
                                            value={personalInfo.mobile}
                                            placeholder={phonePlaceholder}
                                            pattern={phonePattern}
                                            message-when-pattern-mismatch={phonePatternError}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Phone</label>
                                    <div class="slds-form-element__help">
                                        Format: {phoneFormatHint}
                                    </div>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="tel"
                                            name="phone"
                                            value={personalInfo.phone}
                                            placeholder={phonePlaceholder}
                                            pattern={phonePattern}
                                            message-when-pattern-mismatch={phonePatternError}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Website</label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="url"
                                            name="website"
                                            value={personalInfo.website}
                                            onchange={handlePersonalInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Politically Exposed Person (PEP)?
                                <lightning-helptext
                                    content="A PEP is someone who holds or has held a prominent public role, such as a government official, senior politician, or military leader. This also includes their immediate family and close business associates.">
                                </lightning-helptext>
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-radio-group
                                    name="isPEP"
                                    options={yesNoOptions}
                                    value={personalInfo.isPEP}
                                    type="radio"
                                    onchange={handlePersonalInfoChange}>
                                </lightning-radio-group>
                            </div>
                        </div>


                        <div class="slds-m-top_large">
                            <lightning-button 
                                label="Back" 
                                class="slds-m-right_small" 
                                onclick={handleBack}>
                            </lightning-button>
                            <lightning-button 
                                label="Continue" 
                                variant="brand" 
                                onclick={handleContinue}
                                disabled={isPersonalInfoStepDisabled}>
                            </lightning-button>
                        </div>
                    </template>

                    <!-- Section 1B: Address -->
                    <template if:true={showAddressStep}>
                        <div class="slds-text-heading_medium slds-m-bottom_medium">Address</div>
                        
                        <!-- Street Address -->
                        <div class="slds-form-element slds-m-bottom_medium">
                            <label class="slds-form-element__label">
                                <abbr class="slds-required" title="required">*</abbr> Street
                            </label>
                            <div class="slds-form-element__control">
                                <lightning-textarea
                                    name="street"
                                    value={addressInfo.street}
                                    rows="3"
                                    onchange={handleAddressChange}>
                                </lightning-textarea>
                            </div>
                        </div>

                        <!-- City and State/Province -->
                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> City
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="city"
                                            value={addressInfo.city}
                                            onchange={handleAddressChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> State/Province
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="state"
                                            value={addressInfo.state}
                                            onchange={handleAddressChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Zip/Postal Code and Country -->
                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Zip/Postal Code
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="text"
                                            name="postalCode"
                                            value={addressInfo.postalCode}
                                            onchange={handleAddressChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Country
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="country"
                                            value={addressInfo.country}
                                            options={countryPicklistOptions}
                                            onchange={handleAddressChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Address Type / Verification -->
                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-3">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        Address Type
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="addressType"
                                            value={addressInfo.addressType}
                                            options={addressTypeOptions}
                                            onchange={handleAddressChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Proof of Address Upload -->

                        <div class="slds-m-top_large">
                            <lightning-button 
                                label="Back" 
                                class="slds-m-right_small" 
                                onclick={handleBack}>
                            </lightning-button>
                            <lightning-button 
                                label="Continue" 
                                variant="brand" 
                                onclick={handleContinue}
                                disabled={isAddressStepDisabled}>
                            </lightning-button>
                        </div>
                    </template>

                    <!-- Section 1C: Service Assessment -->
                    <template if:true={showRiskStep}>
                        <div class="slds-text-heading_medium slds-m-bottom_medium">Service Assessment</div>
                        <p class="slds-text-body_regular slds-m-bottom_large slds-text-color_weak">
                            Additional information required to assess your service requirements.
                        </p>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        Expected Monthly Transaction Volume
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="number"
                                            name="expectedMonthlyVolume"
                                            value={riskInfo.expectedMonthlyVolume}
                                            formatter="currency"
                                            step="0.01"
                                            onchange={handleRiskInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Estimated Number of Transactions per Month
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-input
                                            type="number"
                                            name="estimatedTransactionsPerMonth"
                                            value={riskInfo.estimatedTransactionsPerMonth}
                                            onchange={handleRiskInfoChange}>
                                        </lightning-input>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Source of Wealth
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-combobox
                                            name="sourceOfWealth"
                                            value={riskInfo.sourceOfWealth}
                                            options={sourceOfWealthOptions}
                                            onchange={handleRiskInfoChange}>
                                        </lightning-combobox>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-form-element">

                                        <abbr class="slds-required" title="required">*</abbr> Geographic Exposure - Countries

                                            name="geographicExposure"
                                            source-label="Available Countries"
                                            selected-label="Selected Countries"
                                            options={countryPicklistOptions}
                                            value={riskInfo.geographicExposure}
                                            onchange={handleRiskInfoChange}>

                                    </div>
                                </div>
                            </div>

                        <div class="slds-form-element slds-m-bottom_medium">

                                <abbr class="slds-required" title="required">*</abbr> Intended Use of Account

                                <lightning-textarea
                                    name="intendedUseOfAccount"

                                    onchange={handleRiskInfoChange}>

                            </div>

                        <!-- Service-Specific Questions for Private Clients -->
                        <template if:true={hasFXService}>

                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">

                                                <abbr class="slds-required" title="required">*</abbr> Currencies You Will Send
                                            </label>

                                                <lightning-dual-listbox
                                                    name="currenciesToSend"
                                                    source-label="Available"
                                                    selected-label="Selected"
                                                    options={currencyOptions}
                                                    value={serviceSpecific.currenciesToSend}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-dual-listbox>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Currencies You Will Receive
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-dual-listbox
                                                    name="currenciesToReceive"
                                                    source-label="Available"
                                                    selected-label="Selected"
                                                    options={currencyOptions}
                                                    value={serviceSpecific.currenciesToReceive}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-dual-listbox>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Countries Grid -->
                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Countries Funds Will Be Sent To
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-dual-listbox
                                                    name="countriesFundsSentTo"
                                                    source-label="Available"
                                                    selected-label="Selected"
                                                    options={countryPicklistOptions}
                                                    value={serviceSpecific.countriesFundsSentTo}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-dual-listbox>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Countries Funds Will Be Received From
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-dual-listbox
                                                    name="countriesFundsReceivedFrom"
                                                    source-label="Available"
                                                    selected-label="Selected"
                                                    options={countryPicklistOptions}
                                                    value={serviceSpecific.countriesFundsReceivedFrom}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-dual-listbox>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Forward Contracts Required?
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-radio-group
                                            name="fxForwardContractsRequired"
                                            value={serviceSpecific.fxForwardContractsRequired}
                                            options={yesNoOptions}
                                            type="radio"
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-radio-group>
                                    </div>
                                </div>

                                <template if:true={showHedgingNeeds}>
                                    <div class="slds-form-element slds-m-bottom_medium">
                                        <label class="slds-form-element__label">
                                            <abbr class="slds-required" title="required">*</abbr> Hedging Needs
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-textarea
                                                name="fxHedgingNeeds"
                                                value={serviceSpecific.fxHedgingNeeds}
                                                onchange={handleServiceSpecificChange}>
                                            </lightning-textarea>
                                        </div>
                                    </div>
                                </template>

                            </div>
                        </template>

                        <!-- Crypto Service Questions -->
                        <template if:true={hasCryptoService}>
                            <div class="slds-box slds-m-bottom_large">
                                <div class="slds-text-heading_small slds-m-bottom_small">Cryptocurrency Service Details</div>
                                
                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Digital Assets to Buy/Sell/Hold
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="digitalAssets"
                                            options={digitalAssetOptions}
                                            value={serviceSpecific.digitalAssets}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Expected Monthly Digital Asset Transaction Volume
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="expectedMonthlyCryptoVolume"
                                                    value={serviceSpecific.expectedMonthlyCryptoVolume}
                                                    formatter="currency"
                                                    step="0.01"
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Average Digital Asset Transaction Size
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="averageCryptoTransactionSize"
                                                    value={serviceSpecific.averageCryptoTransactionSize}
                                                    formatter="currency"
                                                    step="0.01"
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- VASP question removed - regulatory status captured in Company Info step -->
                            </div>
                        </template>

                        <!-- Advisory Service Questions -->
                        <template if:true={hasAdvisoryService}>
                            <div class="slds-box slds-m-bottom_large">
                                <div class="slds-text-heading_small slds-m-bottom_small">Advisory Service Details</div>
                                
                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Advisory Services Required
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="advisoryServicesRequired"
                                            options={advisoryServicesOptions}
                                            value={serviceSpecific.advisoryServicesRequired}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Investment Objectives
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-checkbox-group
                                            name="investmentObjectives"
                                            options={investmentObjectivesOptions}
                                            value={serviceSpecific.investmentObjectives}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-checkbox-group>
                                    </div>
                                </div>

                                <div class="slds-form-element slds-m-bottom_medium">
                                    <label class="slds-form-element__label">
                                        <abbr class="slds-required" title="required">*</abbr> Risk Appetite
                                    </label>
                                    <div class="slds-form-element__control">
                                        <lightning-radio-group
                                            name="riskAppetite"
                                            options={riskAppetiteOptions}
                                            value={serviceSpecific.riskAppetite}
                                            type="radio"
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-radio-group>
                                    </div>
                                </div>

                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-2">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">Time Horizon for Investment Decisions (Years)</label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="number"
                                                    name="timeHorizon"
                                                    value={serviceSpecific.timeHorizon}
                                                    onchange={handleServiceSpecificChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-form-element">
                                    <label class="slds-form-element__label">Existing Advisory Relationships</label>
                                    <div class="slds-form-element__control">
                                        <lightning-textarea
                                            name="existingAdvisoryRelationships"
                                            value={serviceSpecific.existingAdvisoryRelationships}
                                            onchange={handleServiceSpecificChange}>
                                        </lightning-textarea>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <div class="slds-m-top_large">
                            <lightning-button 
                                label="Back" 
                                class="slds-m-right_small" 
                                onclick={handleBack}>
                            </lightning-button>
                            <lightning-button 
                                label="Continue" 
                                variant="brand" 
                                onclick={handleContinue}
                                disabled={isRiskStepDisabled}>
                            </lightning-button>
                        </div>
                    </template>
                </template>

                <!-- CORPORATE CLIENT BRANCH -->
                <template if:true={showCorporateBranch}>
                    
                    <!-- Section 2A: Shareholders/Directors -->
                    <template if:true={showShareholdersStep}>
                        <div class="slds-text-heading_medium slds-m-bottom_medium">Shareholders/Directors</div>
                        <p class="slds-text-body_regular slds-m-bottom_large slds-text-color_weak">
                            Please provide details for all shareholders (beneficial owners with 25% or more ownership) and directors.
                        </p>

                        <!-- Shareholders/Directors Section -->
                        <div class="slds-text-heading_small slds-m-bottom_medium">Shareholders/Directors</div>
                        <template for:each={shareholdersWithComputedFields} for:item="shareholder">
                            <div key={shareholder.id} class="slds-box slds-m-bottom_medium">
                                <div class="slds-grid slds-grid_vertical-align-start slds-m-bottom_small">
                                    <div class="slds-col slds-has-flexi-truncate">
                                        <span class="slds-text-title_caps slds-text-color_weak">Shareholder/Director</span>
                                    </div>
                                    <div class="slds-col slds-no-flex">
                                        <lightning-button-icon
                                            icon-name="utility:close"
                                            alternative-text="Remove shareholder/director"
                                            variant="bare"
                                            size="small"
                                            class="slds-float_right"
                                            data-id={shareholder.id}
                                            onclick={handleRemoveShareholder}>
                                        </lightning-button-icon>
                                    </div>
                                </div>
                                <!-- Type field hidden - defaults to Individual. Kept for future Corporate shareholder support -->
                                
                                <!-- Role Selection Checkboxes -->
                                <div class="slds-grid slds-gutters slds-m-bottom_small">
                                    <div class="slds-col slds-size_1-of-1">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Role(s)
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-checkbox-group
                                                    name="roles"
                                                    data-id={shareholder.id}
                                                    options={roleOptions}
                                                    value={shareholder.selectedRoles}
                                                    onchange={handleShareholderRoleChange}>
                                                </lightning-checkbox-group>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Individual Name Fields (shown only for Individual type) -->
                                <template if:true={shareholder.isIndividual}>
                                <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                    <abbr class="slds-required" title="required">*</abbr> First Name
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="text"
                                                        name="firstName"
                                                    data-id={shareholder.id}
                                                        value={shareholder.firstName}
                                                        pattern="[A-Za-z\s\-'.]+"
                                                        message-when-pattern-mismatch="Names should only contain letters"
                                                    onchange={handleShareholderChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-form-element">
                                                <label class="slds-form-element__label">Middle Name</label>
                                                <div class="slds-form-element__control">
                                                    <lightning-input
                                                        type="text"
                                                        name="middleName"
                                                        data-id={shareholder.id}
                                                        value={shareholder.middleName}
                                                        pattern="[A-Za-z\s\-'.]+"
                                                        message-when-pattern-mismatch="Names should only contain letters"
                                                        onchange={handleShareholderChange}>
                                                    </lightning-input>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                    <abbr class="slds-required" title="required">*</abbr> Last Name
                                            </label>
                                            <div class="slds-form-element__control">
                                                    <lightning-input
                                                        type="text"
                                                        name="lastName"
                                                    data-id={shareholder.id}
                                                        value={shareholder.lastName}
                                                        pattern="[A-Za-z\s\-'.]+"
                                                        message-when-pattern-mismatch="Names should only contain letters"
                                                    onchange={handleShareholderChange}>
                                                    </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                </template>
                                
                                <!-- Corporate Name Field (shown only for Corporate type) -->
                                <template if:true={shareholder.isCorporate}>
                                    <div class="slds-grid slds-gutters">
                                        <div class="slds-col slds-size_1-of-1">
                                            <div class="slds-form-element">
                                                <label class="slds-form-element__label">
                                                    <abbr class="slds-required" title="required">*</abbr> Legal Entity Name
                                                </label>
                                                <div class="slds-form-element__control">
                                                    <lightning-input
                                                        type="text"
                                                        name="legalEntityName"
                                                        data-id={shareholder.id}
                                                        value={shareholder.legalEntityName}
                                                        onchange={handleShareholderChange}>
                                                    </lightning-input>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                <div class="slds-grid slds-gutters">
                                    <!-- Ownership % - Show only if Shareholder role is selected -->
                                    <template if:true={shareholder.isShareholder}>
                                        <div class="slds-col slds-size_1-of-3">
                                            <div class="slds-form-element">
                                                <label class="slds-form-element__label">
                                                    <abbr class="slds-required" title="required">*</abbr> Ownership %
                                                </label>
                                                <div class="slds-form-element__control">
                                                    <lightning-input
                                                        type="number"
                                                        name="ownershipPercentage"
                                                        data-id={shareholder.id}
                                                        value={shareholder.ownershipPercentage}
                                                        min="0"
                                                        max="100"
                                                        onchange={handleShareholderChange}>
                                                    </lightning-input>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> PEP?
                                                <lightning-helptext
                                                    content="A PEP is someone who holds or has held a prominent public role, such as a government official, senior politician, or military leader. This also includes their immediate family and close business associates.">
                                                </lightning-helptext>
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-radio-group
                                                    name={shareholder.pepRadioName}
                                                    data-field="isPEP"
                                                    data-id={shareholder.id}
                                                    options={yesNoOptions}
                                                    value={shareholder.isPEP}
                                                    type="radio"
                                                    onchange={handleShareholderChange}>
                                                </lightning-radio-group>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Additional shareholder KYC fields -->
                                <div class="slds-grid slds-gutters slds-m-top_small">
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Date of Birth
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="date"
                                                    name="dateOfBirthOrIncorporation"
                                                    data-id={shareholder.id}
                                                    value={shareholder.dateOfBirthOrIncorporation}
                                                    onchange={handleShareholderChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Country of Residence
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-combobox
                                                    name="countryOfResidenceOrIncorporation"
                                                    data-id={shareholder.id}
                                                    value={shareholder.countryOfResidenceOrIncorporation}
                                                    options={countryPicklistOptions}
                                                    onchange={handleShareholderChange}>
                                                </lightning-combobox>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Nationality
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-combobox
                                                    name="nationalityOrCountryOfIncorporation"
                                                    data-id={shareholder.id}
                                                    value={shareholder.nationalityOrCountryOfIncorporation}
                                                    options={countryPicklistOptions}
                                                    onchange={handleShareholderChange}>
                                                </lightning-combobox>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-grid slds-gutters slds-m-top_small">
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                <abbr class="slds-required" title="required">*</abbr> Passport Number
                                                <lightning-helptext
                                                    content="If you don't have a passport number, a government-issued ID number will suffice.">
                                                </lightning-helptext>
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-input
                                                    type="text"
                                                    name="governmentIdOrRegistrationNumber"
                                                    data-id={shareholder.id}
                                                    value={shareholder.governmentIdOrRegistrationNumber}
                                                    onchange={handleShareholderChange}>
                                                </lightning-input>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                Source of Wealth
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-combobox
                                                    name="sourceOfWealth"
                                                    data-id={shareholder.id}
                                                    value={shareholder.sourceOfWealth}
                                                    options={sourceOfWealthOptions}
                                                    onchange={handleShareholderChange}>
                                                </lightning-combobox>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label">
                                                Source of Wealth Explanation
                                            </label>
                                            <div class="slds-form-element__control">
                                                <lightning-textarea
                                                    name="sourceOfWealthExplanation"
                                                    data-id={shareholder.id}
                                                    value={shareholder.sourceOfWealthExplanation}
                                                    onchange={handleShareholderChange}>
                                                </lightning-textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- Email and Mobile Number fields -->
                                <div class="slds-grid slds-gutters slds-m-top_small">
                                    <div class="slds-col slds-size_1-of-2">
