<template>
    <lightning-card title="Onboarding Workspace" icon-name="standard:task">
        <div class="slds-p-around_medium workspace-container">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading workspace" size="small"></lightning-spinner>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-theme_error slds-m-bottom_medium" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>{errorMessage}</h2>
                </div>
                <lightning-button
                    label="Retry"
                    variant="neutral"
                    onclick={handleRefresh}
                    class="slds-m-bottom_medium">
                </lightning-button>
            </template>

            <template if:true={hasWorkspace}>
                <section class="workspace-sticky-header slds-box slds-theme_default slds-m-bottom_medium">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_2-of-3">
                            <p class="slds-text-title_caps">Application</p>
                            <p class="slds-text-heading_medium">
                                <a href={workspace.applicationUrl} target="_blank" rel="noopener">{workspace.applicationName}</a>
                            </p>
                            <p class="slds-text-body_regular">{workspace.clientName}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-text-align_right">
                            <span class={statusBadgeClass}>{workspace.status}</span>
                        </div>
                    </div>

                    <div class="slds-m-top_medium">
                        <div class="slds-grid slds-wrap slds-gutters slds-grid_vertical-align-center">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-6">
                                <template if:true={isStatusPathVisible}>
                                    <lightning-progress-indicator
                                        current-step={statusPathCurrentStep}
                                        type="path"
                                        variant="base"
                                        onstepfocus={handleStatusPathStepFocus}>
                                        <template for:each={statusPathSteps} for:item="step">
                                            <lightning-progress-step
                                                key={step.value}
                                                label={step.label}
                                                value={step.value}
                                                data-value={step.value}
                                                onclick={handleStatusPathStepSelect}>
                                            </lightning-progress-step>
                                        </template>
                                    </lightning-progress-indicator>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-6 slds-text-align_right">
                                <lightning-button
                                    label="Update Status"
                                    icon-name="utility:refresh"
                                    variant="neutral"
                                    onclick={handleUpdateStatusPath}
                                    disabled={isRefreshDisabled}>
                                </lightning-button>
                            </div>
                        </div>
                    </div>

                    <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-4">
                            <lightning-button-group>
                                <template if:true={workspace.actions.showStartReview}>
                                    <lightning-button
                                        label="Start Review"
                                        variant="brand"
                                        data-action="START_REVIEW"
                                        disabled={isSaving}
                                        onclick={handleStatusAction}>
                                    </lightning-button>
                                </template>
                                <template if:true={workspace.actions.showApprove}>
                                    <lightning-button
                                        label="Approve"
                                        variant="success"
                                        data-action="APPROVE"
                                        disabled={isSaving}
                                        onclick={handleStatusAction}>
                                    </lightning-button>
                                </template>
                                <template if:true={workspace.actions.showReject}>
                                    <lightning-button
                                        label="Reject / Request Info"
                                        variant="destructive"
                                        data-action="REJECT"
                                        disabled={isSaving}
                                        onclick={handleStatusAction}>
                                    </lightning-button>
                                </template>
                                <template if:true={workspace.actions.showReturnToInProgress}>
                                    <lightning-button
                                        label="Return To In Progress"
                                        variant="neutral"
                                        data-action="RETURN_TO_IN_PROGRESS"
                                        disabled={isSaving}
                                        onclick={handleStatusAction}>
                                    </lightning-button>
                                </template>
                            </lightning-button-group>
                        </div>
                    </div>

                    <template if:true={showConvertSection}>
                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-title_bold slds-m-bottom_x-small">Conversion</h3>
                            <c-onboarding-convert-button record-id={recordId}></c-onboarding-convert-button>
                        </div>
                    </template>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Record Links</h2>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                            <p class="slds-text-title">Onboarding Record</p>
                            <a href={workspace.applicationUrl} target="_blank" rel="noopener">{workspace.applicationName}</a>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                            <p class="slds-text-title">Applicant</p>
                            <template if:true={workspace.applicant}>
                                <a href={workspace.applicant.url} target="_blank" rel="noopener">{workspace.applicant.name}</a>
                            </template>
                            <template if:false={hasApplicant}>
                                <span>-</span>
                            </template>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                            <p class="slds-text-title">{businessProfileLabel}</p>
                            <template if:true={hasBusinessProfile}>
                                <a href={workspace.businessProfile.url} target="_blank" rel="noopener">{workspace.businessProfile.name}</a>
                            </template>
                            <template if:false={hasBusinessProfile}>
                                <span>-</span>
                            </template>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">
                            <p class="slds-text-title">Converted Account</p>
                            <template if:true={hasConvertedAccount}>
                                <a href={workspace.convertedAccountUrl} target="_blank" rel="noopener">{workspace.convertedAccountName}</a>
                            </template>
                            <template if:false={hasConvertedAccount}>
                                <span>-</span>
                            </template>
                        </div>
                    </div>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Review KPIs</h2>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">Risk Rating</p>
                            <p>{workspace.riskRating}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">Risk Score</p>
                            <p>{workspace.riskScore}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">EDD Required</p>
                            <p>{eddDisplay}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">PEP Flag</p>
                            <p>{pepDisplay}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">Sanctions Flag</p>
                            <p>{sanctionsDisplay}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">Missing Documents</p>
                            <p>{workspace.missingDocumentsCount}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-m-top_small">
                            <p class="slds-text-title">Declarations Accepted</p>
                            <p>{declarationProgress}</p>
                        </div>
                    </div>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Onboarding Application (All Fields)</h2>
                    <lightning-record-form
                        record-id={recordId}
                        object-api-name="Onboarding_Application__c"
                        layout-type="Full"
                        mode="readonly"
                        columns="2">
                    </lightning-record-form>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Business Profile Details</h2>
                    <template if:true={isCorporateClient}>
                        <template if:true={hasCorporateBusinessProfileDetails}>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Purpose of Account</p>
                                    <p>{workspace.businessProfileDetails.purposeOfAccount}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Industry</p>
                                    <p>{workspace.businessProfileDetails.industry}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Products and Services</p>
                                    <p>{workspace.businessProfileDetails.productsAndServices}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Payment Flow Types</p>
                                    <p>{workspace.businessProfileDetails.paymentFlowTypes}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Currencies to Send</p>
                                    <p>{workspace.businessProfileDetails.currenciesToSend}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Currencies to Receive</p>
                                    <p>{workspace.businessProfileDetails.currenciesToReceive}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Expected Transactions / Month</p>
                                    <p>{workspace.businessProfileDetails.expectedTransactionsPerMonth}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Expected Annual Volume</p>
                                    <p>{workspace.businessProfileDetails.expectedAnnualVolume}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Typical Value per Transaction</p>
                                    <p>{workspace.businessProfileDetails.typicalValuePerTransaction}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Largest Single Transaction</p>
                                    <p>{workspace.businessProfileDetails.largestSingleTransaction}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Primary Source of Funds</p>
                                    <p>{workspace.businessProfileDetails.primarySourceOfFunds}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Regulated</p>
                                    <p>{businessProfileIsRegulatedDisplay}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Regulator Name</p>
                                    <p>{workspace.businessProfileDetails.regulatorName}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Regulatory Licence Number</p>
                                    <p>{workspace.businessProfileDetails.regulatoryLicenceNumber}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Regulatory Jurisdiction</p>
                                    <p>{workspace.businessProfileDetails.regulatoryJurisdiction}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                                    <p class="slds-text-title">Source of Wealth Explanation</p>
                                    <p>{workspace.businessProfileDetails.sourceOfWealthExplanation}</p>
                                </div>
                            </div>
                        </template>
                        <template if:false={hasCorporateBusinessProfileDetails}>
                            <p>-</p>
                        </template>
                    </template>

                    <template if:true={isPrivateClient}>
                        <template if:true={hasPrivateFxBusinessProfileDetails}>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                    <p class="slds-text-title">Currencies to Send</p>
                                    <p>{workspace.businessProfileDetails.currenciesToSend}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                    <p class="slds-text-title">Currencies to Receive</p>
                                    <p>{workspace.businessProfileDetails.currenciesToReceive}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 slds-m-top_small">
                                    <p class="slds-text-title">Countries Sent To</p>
                                    <p>{workspace.businessProfileDetails.countriesSentTo}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 slds-m-top_small">
                                    <p class="slds-text-title">Countries Received From</p>
                                    <p>{workspace.businessProfileDetails.countriesReceivedFrom}</p>
                                </div>
                            </div>
                        </template>
                        <template if:false={hasPrivateFxBusinessProfileDetails}>
                            <p>-</p>
                        </template>
                    </template>

                    <template if:false={isCorporateClient}>
                        <template if:false={isPrivateClient}>
                            <p>-</p>
                        </template>
                    </template>
                </section>

                <template if:true={isPrivateClient}>
                    <section class="workspace-section slds-m-bottom_large">
                        <h2 class="slds-text-heading_small slds-m-bottom_small">Private Risk Assessment Details</h2>
                        <template if:true={hasPrivateRiskDetails}>
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Expected Monthly Volume</p>
                                    <p>{workspace.privateRiskDetails.expectedMonthlyVolume}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Estimated Transactions per Month</p>
                                    <p>{workspace.privateRiskDetails.estimatedTransactionsPerMonth}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3">
                                    <p class="slds-text-title">Source of Wealth</p>
                                    <p>{workspace.privateRiskDetails.sourceOfWealth}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Geographic Exposure</p>
                                    <p>{workspace.privateRiskDetails.geographicExposure}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Intended Use of Account</p>
                                    <p>{workspace.privateRiskDetails.intendedUseOfAccount}</p>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-3 slds-m-top_small">
                                    <p class="slds-text-title">Source of Wealth Explanation</p>
                                    <p>{workspace.privateRiskDetails.sourceOfWealthExplanation}</p>
                                </div>
                            </div>
                        </template>
                        <template if:false={hasPrivateRiskDetails}>
                            <p>-</p>
                        </template>
                    </section>
                </template>

                <template if:true={hasBlockers}>
                    <section class="workspace-section slds-theme_warning slds-m-bottom_large">
                        <h2 class="slds-text-heading_small slds-m-bottom_small">What Needs Attention</h2>
                        <ul class="slds-list_dotted slds-p-left_medium">
                            <template for:each={workspace.blockers} for:item="blocker">
                                <li key={blocker}>{blocker}</li>
                            </template>
                        </ul>
                    </section>
                </template>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Related Parties</h2>
                    <div class="slds-p-around_none">
                        <lightning-datatable
                            key-field="partyId"
                            data={workspace.parties}
                            columns={partyColumns}
                            onrowaction={handlePartyRowAction}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Documents & File Preview</h2>
                    <div class="slds-p-around_none">
                        <lightning-datatable
                            key-field="documentId"
                            data={workspace.documents}
                            columns={documentColumns}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>
                </section>

                <section class="workspace-section slds-m-bottom_large">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">Declarations</h2>
                    <div class="slds-p-around_none">
                        <lightning-datatable
                            key-field="declarationId"
                            data={workspace.declarations}
                            columns={declarationColumns}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>
                </section>

            </template>

            <template if:true={isPartyUploadModalOpen}>
                <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text="Close"
                                variant="bare-inverse"
                                onclick={handleClosePartyUploadModal}
                                class="slds-modal__close">
                            </lightning-button-icon>
                            <h2 class="slds-text-heading_medium">Upload Documents for {selectedPartyName}</h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium">
                            <lightning-combobox
                                name="uploadDocumentType"
                                label="Document Type"
                                value={uploadDocumentType}
                                options={uploadDocumentTypeOptions}
                                onchange={handleUploadDocumentTypeChange}>
                            </lightning-combobox>
                            <div class="slds-m-top_medium">
                                <lightning-file-upload
                                    label="Upload Party Files"
                                    name="partyFileUploader"
                                    record-id={selectedPartyId}
                                    multiple
                                    onuploadfinished={handlePartyUploadFinished}>
                                </lightning-file-upload>
                            </div>
                        </div>
                        <footer class="slds-modal__footer">
                            <lightning-button label="Close" onclick={handleClosePartyUploadModal}></lightning-button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>

            <template if:true={isRecordModalOpen}>
                <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_large">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text="Close"
                                variant="bare-inverse"
                                onclick={handleCloseRecordModal}
                                class="slds-modal__close">
                            </lightning-button-icon>
                            <h2 class="slds-text-heading_medium">{modalTitle}</h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium">
                            <template if:true={isPartyEditModal}>
                                <lightning-record-edit-form
                                    record-id={modalRecordId}
                                    object-api-name="Party__c"
                                    onsuccess={handleRecordSaveSuccess}
                                    onerror={handleRecordFormError}>
                                    <div class="slds-grid slds-wrap slds-gutters">
                                        <template if:true={showPrivatePartyFieldSet}>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Salutation__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="First_Name__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Middle_Name__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Last_Name__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Suffix__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Date_of_Birth__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Nationality__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Country_of_Residence__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Government_ID_Number__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Email__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Mobile__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Phone__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Website__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Is_PEP__c"></lightning-input-field></div>
                                        </template>
                                        <template if:true={showCorporatePartyFieldSet}>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Party_Type__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Legal_Entity_Name__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Legal_Entity_Type__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Date_of_Incorporation__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Country_of_Incorporation__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Registration_Number__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Email__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Phone__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Website__c"></lightning-input-field></div>
                                        </template>
                                        <template if:true={showFallbackPartyFieldSet}>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Full_Legal_Name__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Email__c"></lightning-input-field></div>
                                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2"><lightning-input-field field-name="Phone__c"></lightning-input-field></div>
                                        </template>
                                    </div>
                                    <div class="slds-m-top_medium slds-text-align_right">
                                        <lightning-button label="Cancel" variant="neutral" onclick={handleCloseRecordModal} class="slds-m-right_small"></lightning-button>
                                        <lightning-button label="Save" variant="brand" type="submit"></lightning-button>
                                    </div>
                                </lightning-record-edit-form>
                            </template>
                            <template if:false={isPartyEditModal}>
                                <lightning-record-form
                                    record-id={modalRecordId}
                                    object-api-name={modalObjectApiName}
                                    layout-type="Full"
                                    mode={modalMode}
                                    columns="2"
                                    onsuccess={handleRecordSaveSuccess}
                                    onerror={handleRecordFormError}>
                                </lightning-record-form>
                            </template>
                        </div>
                        <footer class="slds-modal__footer">
                            <template if:false={isPartyEditModal}>
                                <lightning-button label="Close" onclick={handleCloseRecordModal}></lightning-button>
                            </template>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>
        </div>
    </lightning-card>
</template>
